<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Fonte — carnet de salle</title>
<meta name="description" content="Programme de musculation, séances guidées et suivi des charges.">
<meta name="theme-color" content="#14171c">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icone.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icone-192.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Fonte">
</head>
<body>
<style>
/* ------------------------------------------------------------------
   Fonte — carnet de salle
   Palette tirée des disques olympiques : jaune 15 kg en accent,
   rouge 25 / bleu 20 / vert 10 pour coder les groupes musculaires.
------------------------------------------------------------------ */
:root {
  --ground: #14171c;
  --surface: #1b1f26;
  --surface-2: #232932;
  --surface-3: #2c333e;
  --line: #333b47;
  --texte: #edeff2;
  --texte-doux: #98a1ae;
  --texte-faible: #6b7583;

  --accent: #f2c230;          /* disque de 15 kg */
  --accent-texte: #f5cc4d;
  --accent-sourd: #4a3d13;
  --sur-accent: #17140a;

  --rouge: #e2453c;           /* 25 kg */
  --bleu: #3d81d6;            /* 20 kg */
  --vert: #35b075;            /* 10 kg */
  --blanc-disque: #dcdad4;    /* 5 kg */
  --violet: #9a7ae0;

  --ok: #35b075;
  --alerte: #e2453c;

  --r-petit: 4px;
  --r: 8px;
  --r-grand: 14px;
  --ombre: 0 1px 2px rgba(0,0,0,.4), 0 8px 24px -12px rgba(0,0,0,.6);

  --display: "Roboto Condensed", "sans-serif-condensed", "Arial Narrow",
             "Helvetica Neue Condensed", ui-sans-serif, system-ui, sans-serif;
  --corps: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto,
           "Helvetica Neue", Arial, sans-serif;

  --nav-h: 62px;
  --max: 540px;
}

@media (prefers-color-scheme: light) {
  :root {
    --ground: #f0efeb;
    --surface: #ffffff;
    --surface-2: #f5f4f0;
    --surface-3: #e7e5df;
    --line: #d8d6ce;
    --texte: #16191e;
    --texte-doux: #5b636f;
    --texte-faible: #838b97;
    --accent: #f2c230;
    --accent-texte: #8a6000;
    --accent-sourd: #fbeec4;
    --sur-accent: #17140a;
    --rouge: #c9342c;
    --bleu: #2f6cbb;
    --vert: #1f8f5b;
    --blanc-disque: #9a978e;
    --violet: #6f4fc4;
    --ok: #1f8f5b;
    --alerte: #c9342c;
    --ombre: 0 1px 2px rgba(20,23,28,.08), 0 10px 26px -14px rgba(20,23,28,.35);
  }
}

:root[data-theme="light"] {
  --ground: #f0efeb; --surface: #ffffff; --surface-2: #f5f4f0; --surface-3: #e7e5df;
  --line: #d8d6ce; --texte: #16191e; --texte-doux: #5b636f; --texte-faible: #838b97;
  --accent: #f2c230; --accent-texte: #8a6000; --accent-sourd: #fbeec4; --sur-accent: #17140a;
  --rouge: #c9342c; --bleu: #2f6cbb; --vert: #1f8f5b; --blanc-disque: #9a978e; --violet: #6f4fc4;
  --ok: #1f8f5b; --alerte: #c9342c;
  --ombre: 0 1px 2px rgba(20,23,28,.08), 0 10px 26px -14px rgba(20,23,28,.35);
}
:root[data-theme="dark"] {
  --ground: #14171c; --surface: #1b1f26; --surface-2: #232932; --surface-3: #2c333e;
  --line: #333b47; --texte: #edeff2; --texte-doux: #98a1ae; --texte-faible: #6b7583;
  --accent: #f2c230; --accent-texte: #f5cc4d; --accent-sourd: #4a3d13; --sur-accent: #17140a;
  --rouge: #e2453c; --bleu: #3d81d6; --vert: #35b075; --blanc-disque: #dcdad4; --violet: #9a7ae0;
  --ok: #35b075; --alerte: #e2453c;
  --ombre: 0 1px 2px rgba(0,0,0,.4), 0 8px 24px -12px rgba(0,0,0,.6);
}

* { box-sizing: border-box; }

body {
  margin: 0;
  background: var(--ground);
  color: var(--texte);
  font-family: var(--corps);
  font-size: 15px;
  line-height: 1.5;
  -webkit-text-size-adjust: 100%;
  -webkit-tap-highlight-color: transparent;
  overscroll-behavior-y: none;
}

h1, h2, h3, .display { font-family: var(--display); font-weight: 700; margin: 0; }
button, input, select, textarea { font: inherit; color: inherit; }
button { cursor: pointer; }

:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: var(--r-petit); }

.num { font-variant-numeric: tabular-nums; font-family: var(--display); }

/* ---------------- charpente ---------------- */

#app {
  max-width: var(--max);
  margin: 0 auto;
  min-height: 100dvh;
  padding-bottom: calc(var(--nav-h) + env(safe-area-inset-bottom, 0px));
  position: relative;
}

.barre {
  position: sticky; top: 0; z-index: 40;
  display: flex; align-items: center; gap: 12px;
  padding: calc(env(safe-area-inset-top, 0px) + 14px) 16px 12px;
  background: var(--surface);
  border-bottom: 1px solid var(--line);
  /* moletage discret, comme le grip d'une barre */
  background-image: repeating-linear-gradient(115deg,
    transparent 0 3px, color-mix(in srgb, var(--texte) 3%, transparent) 3px 4px);
}
.barre h1 {
  font-size: 21px; letter-spacing: .01em; text-transform: uppercase;
  flex: 1; min-width: 0;
}
.barre .sous { font-family: var(--corps); font-size: 12px; font-weight: 400;
  color: var(--texte-doux); text-transform: none; letter-spacing: 0; display: block; }

.ecran { padding: 16px; display: none; }
.ecran.actif { display: block; animation: entree .28s cubic-bezier(.2,.7,.3,1); }
@keyframes entree { from { opacity: 0; transform: translateY(10px); } }

.section-titre {
  font-family: var(--display); font-size: 12px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .14em; color: var(--texte-faible);
  margin: 22px 0 10px;
}
.ecran > .section-titre:first-child { margin-top: 4px; }

/* ---------------- navigation basse ---------------- */

.nav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
  height: calc(var(--nav-h) + env(safe-area-inset-bottom, 0px));
  padding-bottom: env(safe-area-inset-bottom, 0px);
  display: flex;
  background: color-mix(in srgb, var(--surface) 92%, transparent);
  backdrop-filter: blur(12px);
  border-top: 1px solid var(--line);
}
.nav-inner { max-width: var(--max); margin: 0 auto; width: 100%; display: flex; }
.nav button {
  flex: 1; background: none; border: 0; padding: 6px 0 4px;
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  color: var(--texte-faible); font-family: var(--display);
  font-size: 10.5px; text-transform: uppercase; letter-spacing: .08em;
  position: relative; transition: color .18s;
}
.nav button svg { width: 23px; height: 23px; fill: none; stroke: currentColor;
  stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
.nav button.actif { color: var(--accent-texte); }
.nav button.actif::before {
  content: ""; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
  width: 26px; height: 3px; border-radius: 0 0 3px 3px; background: var(--accent);
}

/* ---------------- briques ---------------- */

.carte {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--r);
  padding: 14px;
}
.carte + .carte { margin-top: 10px; }

.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  border: 1px solid var(--line); background: var(--surface-2); color: var(--texte);
  border-radius: var(--r); padding: 11px 16px;
  font-family: var(--display); font-size: 15px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .06em;
  transition: transform .08s, background .18s, border-color .18s;
}
.btn:active { transform: scale(.97); }
.btn.plein { background: var(--accent); color: var(--sur-accent); border-color: var(--accent); }
.btn.fantome { background: transparent; }
.btn.large { width: 100%; padding: 15px; font-size: 17px; }
.btn.danger { color: var(--alerte); border-color: color-mix(in srgb, var(--alerte) 40%, var(--line)); }
.btn:disabled { opacity: .4; }

.puce {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: var(--display); font-size: 11.5px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .07em;
  padding: 3px 9px; border-radius: 999px;
  background: var(--surface-3); color: var(--texte-doux);
}
.puce.accent { background: var(--accent-sourd); color: var(--accent-texte); }
.puce.ok { background: color-mix(in srgb, var(--ok) 18%, transparent); color: var(--ok); }

.rangee { display: flex; align-items: center; gap: 12px; }
.pousse { margin-left: auto; }
.grille-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.grille-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }

.vide { text-align: center; color: var(--texte-faible); padding: 34px 16px; }
.vide svg { width: 46px; height: 46px; stroke: currentColor; fill: none; stroke-width: 1.4; opacity: .5; }

/* ---------------- choix (onboarding & réglages) ---------------- */

.choix { display: grid; gap: 10px; }
.choix button {
  text-align: left; background: var(--surface); border: 1.5px solid var(--line);
  border-radius: var(--r); padding: 14px; display: flex; align-items: center; gap: 14px;
  transition: border-color .16s, background .16s, transform .08s;
}
.choix button:active { transform: scale(.985); }
.choix button.pris { border-color: var(--accent); background: var(--accent-sourd); }
.choix .disque { flex: none; }
.choix .titre { font-family: var(--display); font-size: 17px; font-weight: 700; text-transform: uppercase; letter-spacing: .02em; }
.choix .desc { font-size: 13px; color: var(--texte-doux); line-height: 1.35; }

.segments { display: flex; gap: 6px; background: var(--surface-2); padding: 4px; border-radius: var(--r); }
.segments button {
  flex: 1; border: 0; background: none; border-radius: var(--r-petit); padding: 9px 4px;
  font-family: var(--display); font-weight: 700; font-size: 15px; color: var(--texte-doux);
  transition: background .16s, color .16s;
}
.segments button.pris { background: var(--accent); color: var(--sur-accent); }

/* ---------------- figurine ---------------- */

.figurine { width: 100%; display: block; background: var(--surface-2); border-radius: var(--r); }
.fig-sol { stroke: var(--line); }
.fig-membre-loin { stroke: color-mix(in srgb, var(--texte) 28%, transparent); }
.fig-corps { stroke: var(--texte); }
.fig-tete { fill: var(--texte); }
.fig-charge { stroke: var(--accent); fill: none; }
.fig-charge-plein { fill: var(--accent); }
.fig-corps-plein { fill: var(--texte); }
.fig-membre-loin-plein { fill: color-mix(in srgb, var(--texte) 30%, transparent); }
.fig-decor { stroke: var(--texte-faible); fill: none; }

/* ---------------- séance ---------------- */

#seance { padding-bottom: 24px; }

.entete-exo { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 12px; }
.entete-exo h2 { font-size: 24px; text-transform: uppercase; letter-spacing: .01em; line-height: 1.1; }

.progression-seance { display: flex; gap: 3px; margin: 12px 0 16px; }
.progression-seance i {
  flex: 1; height: 4px; border-radius: 2px; background: var(--surface-3);
  transition: background .3s;
}
.progression-seance i.faite { background: var(--vert); }
.progression-seance i.encours { background: var(--accent); }

.serie {
  display: grid; grid-template-columns: 34px 1fr 1fr 46px; gap: 8px; align-items: center;
  padding: 8px; border-radius: var(--r); background: var(--surface);
  border: 1px solid var(--line);
}
.serie + .serie { margin-top: 7px; }
.serie.faite { border-color: color-mix(in srgb, var(--vert) 45%, var(--line)); background: color-mix(in srgb, var(--vert) 8%, var(--surface)); }
.serie .rang { font-family: var(--display); font-weight: 700; color: var(--texte-faible); text-align: center; font-size: 15px; }
.serie label { display: block; font-size: 10px; text-transform: uppercase; letter-spacing: .1em; color: var(--texte-faible); font-family: var(--display); }
.serie input {
  width: 100%; background: var(--surface-2); border: 1px solid var(--line);
  border-radius: var(--r-petit); padding: 9px 8px; text-align: center;
  font-family: var(--display); font-size: 19px; font-weight: 700;
  font-variant-numeric: tabular-nums;
}
.serie input:focus { border-color: var(--accent); outline: none; }
.serie .valider {
  width: 46px; height: 44px; border-radius: var(--r); border: 1px solid var(--line);
  background: var(--surface-2); display: grid; place-items: center;
}
.serie.faite .valider { background: var(--vert); border-color: var(--vert); }
.serie .valider svg { width: 20px; height: 20px; stroke: var(--texte-doux); fill: none; stroke-width: 2.6; stroke-linecap: round; stroke-linejoin: round; }
.serie.faite .valider svg { stroke: #fff; }

.consigne { font-size: 13.5px; color: var(--texte-doux); line-height: 1.5; }
.consigne b { color: var(--texte); font-weight: 600; }

/* ---------------- chrono de repos : un disque vu de face ---------------- */

.repos {
  position: fixed; inset: 0; z-index: 90;
  background: color-mix(in srgb, var(--ground) 94%, transparent);
  backdrop-filter: blur(6px);
  display: none; flex-direction: column; align-items: center; justify-content: center; gap: 22px;
  animation: fondu .2s;
}
.repos.ouvert { display: flex; }
@keyframes fondu { from { opacity: 0; } }
.repos .disque-chrono { position: relative; width: 250px; height: 250px; }
.repos svg { width: 100%; height: 100%; transform: rotate(-90deg); }
.repos .piste { stroke: var(--surface-3); }
.repos .jauge { stroke: var(--accent); stroke-linecap: round; transition: stroke-dashoffset .3s linear; }
.repos .compte {
  position: absolute; inset: 0; display: grid; place-items: center;
  font-family: var(--display); font-size: 62px; font-weight: 700;
  font-variant-numeric: tabular-nums; letter-spacing: -.02em;
}
.repos .compte small { display: block; font-size: 12px; letter-spacing: .16em; color: var(--texte-doux); text-align: center; }
.repos.fini .jauge { stroke: var(--ok); }
.repos.fini .compte { animation: pulse .6s ease-in-out 3; }
@keyframes pulse { 50% { transform: scale(1.08); color: var(--ok); } }

/* ---------------- graphiques ---------------- */

.graphe { width: 100%; height: 140px; display: block; }
.graphe .aire { fill: color-mix(in srgb, var(--accent) 18%, transparent); }
.graphe .ligne { stroke: var(--accent); fill: none; stroke-width: 2; stroke-linejoin: round; stroke-linecap: round; }
.graphe .grille { stroke: var(--line); stroke-width: 1; }
.graphe .bout { fill: var(--accent); }
.graphe text { fill: var(--texte-faible); font-size: 9px; font-family: var(--display); }

.barres { display: flex; align-items: flex-end; gap: 5px; height: 110px; }
.barres div { flex: 1; background: var(--surface-3); border-radius: 3px 3px 0 0; position: relative; min-height: 3px; transition: height .5s cubic-bezier(.2,.7,.3,1); }
.barres div.forte { background: var(--accent); }

.stat { text-align: center; padding: 12px 6px; background: var(--surface); border: 1px solid var(--line); border-radius: var(--r); }
.stat .v { font-family: var(--display); font-size: 26px; font-weight: 700; font-variant-numeric: tabular-nums; line-height: 1.1; }
.stat .l { font-size: 10.5px; text-transform: uppercase; letter-spacing: .1em; color: var(--texte-faible); font-family: var(--display); margin-top: 2px; }

/* ---------------- listes ---------------- */

.liste-exo {
  display: flex; align-items: center; gap: 12px; width: 100%;
  background: var(--surface); border: 1px solid var(--line); border-radius: var(--r);
  padding: 10px 12px; text-align: left; margin-bottom: 8px;
  transition: transform .08s, border-color .16s;
}
.liste-exo:active { transform: scale(.99); }
.liste-exo .vignette { flex: none; width: 62px; height: 50px; border-radius: var(--r-petit); background: var(--surface-2); }
.liste-exo .nom { font-family: var(--display); font-size: 16px; font-weight: 700; text-transform: uppercase; letter-spacing: .01em; line-height: 1.15; }
.liste-exo .meta { font-size: 12px; color: var(--texte-doux); }

.disque {
  width: 26px; height: 26px; border-radius: 50%; flex: none;
  border: 3px solid var(--c, var(--accent));
  background: radial-gradient(circle at center, transparent 0 22%, var(--c, var(--accent)) 22% 100%);
  opacity: .95;
}

.muscles { display: flex; gap: 10px; justify-content: center; }
.muscles svg { width: 108px; height: 190px; }
.muscles .zone { fill: var(--surface-3); transition: fill .3s; }
.muscles .zone.primaire { fill: var(--accent); }
.muscles .zone.secondaire { fill: color-mix(in srgb, var(--accent) 40%, var(--surface-3)); }
.muscles .contour { fill: none; stroke: var(--line); stroke-width: 1.2; }
.muscles figcaption { text-align: center; font-family: var(--display); font-size: 10px;
  text-transform: uppercase; letter-spacing: .12em; color: var(--texte-faible); margin-top: 2px; }

/* ---------------- feuille modale ---------------- */

.feuille {
  position: fixed; inset: 0; z-index: 80; display: none;
  background: color-mix(in srgb, #000 55%, transparent);
}
.feuille.ouverte { display: block; animation: fondu .18s; }
.feuille .contenu {
  position: absolute; bottom: 0; left: 0; right: 0;
  max-width: var(--max); margin: 0 auto;
  max-height: 88dvh; overflow-y: auto;
  background: var(--ground); border-radius: var(--r-grand) var(--r-grand) 0 0;
  border-top: 1px solid var(--line);
  padding: 8px 16px calc(24px + env(safe-area-inset-bottom, 0px));
  animation: monte .3s cubic-bezier(.2,.8,.3,1);
}
@keyframes monte { from { transform: translateY(100%); } }
.feuille .poignee { width: 38px; height: 4px; border-radius: 2px; background: var(--surface-3); margin: 6px auto 14px; }

.toast {
  position: fixed; left: 50%; bottom: calc(var(--nav-h) + 18px); transform: translateX(-50%);
  background: var(--surface-3); color: var(--texte); border: 1px solid var(--line);
  padding: 10px 16px; border-radius: 999px; font-size: 13.5px; z-index: 95;
  box-shadow: var(--ombre); animation: toast 2.6s forwards;
  pointer-events: none; white-space: nowrap; max-width: 90vw; overflow: hidden;
}
@keyframes toast {
  0% { opacity: 0; transform: translate(-50%, 12px); }
  10%, 82% { opacity: 1; transform: translate(-50%, 0); }
  100% { opacity: 0; transform: translate(-50%, -6px); }
}

.champ { display: block; margin-bottom: 12px; }
.champ span { display: block; font-family: var(--display); font-size: 11px; text-transform: uppercase;
  letter-spacing: .1em; color: var(--texte-faible); margin-bottom: 5px; }
.champ input, .champ select {
  width: 100%; background: var(--surface); border: 1px solid var(--line);
  border-radius: var(--r); padding: 12px; font-family: var(--display);
  font-size: 17px; font-weight: 700; font-variant-numeric: tabular-nums;
}
.champ input:focus, .champ select:focus { border-color: var(--accent); outline: none; }

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: .01ms !important; animation-iteration-count: 1 !important;
    transition-duration: .01ms !important; }
}

/* ---------------- échauffement (séance) ---------------- */
.echauffement { background: var(--surface); border: 1px solid var(--line); border-radius: var(--r); padding: 0 14px; margin-bottom: 10px; }
.echauffement summary { list-style: none; cursor: pointer; padding: 12px 0; font-family: var(--display); font-weight: 700;
  text-transform: uppercase; letter-spacing: .04em; font-size: 14px; display: flex; align-items: center; gap: 8px; }
.echauffement summary::-webkit-details-marker { display: none; }
.echauffement summary::before { content: '+'; color: var(--accent); font-size: 18px; width: 14px; text-align: center; }
.echauffement[open] summary::before { content: '–'; }
.ech-liste { display: flex; flex-direction: column; gap: 6px; padding-bottom: 6px; }
.ech-serie { display: grid; grid-template-columns: 72px 44px 1fr; align-items: center; gap: 8px;
  padding: 7px 10px; background: var(--surface-2); border-radius: var(--r-petit); }
.ech-serie .num { font-size: 16px; }
.ech-note { color: var(--texte-faible); font-size: 12px; text-align: right; }

/* ---------------- record personnel ---------------- */
.pr-star { color: var(--accent); font-size: 12px; margin-left: 3px; }
.toast.record { background: var(--accent); color: var(--sur-accent); font-family: var(--display);
  font-weight: 700; text-transform: uppercase; letter-spacing: .03em; }

/* ---------------- calendrier d'assiduité ---------------- */
.calendrier { display: flex; gap: 3px; overflow-x: auto; padding: 2px 0 4px; }
.cal-col { display: flex; flex-direction: column; gap: 3px; }
.cal { width: 13px; height: 13px; border-radius: 3px; background: var(--surface-3); flex: none; }
.cal.n1 { background: color-mix(in srgb, var(--accent) 35%, var(--surface-3)); }
.cal.n2 { background: color-mix(in srgb, var(--accent) 65%, var(--surface-3)); }
.cal.n3 { background: var(--accent); }
.cal.nf { background: transparent; }

/* ---------------- volume par muscle ---------------- */
.vm-ligne { display: grid; grid-template-columns: 96px 1fr 28px; align-items: center; gap: 10px; padding: 5px 0; }
.vm-nom { font-size: 13px; color: var(--texte-doux); }

/* ------------------------------------------------------------------
   Le bonhomme.

   Plutôt que trente dessins figés, un petit moteur de cinématique :
   chaque exercice donne deux poses (départ / fin du mouvement) et
   l'app interpole entre les deux. Les angles sont en degrés, mesurés
   depuis l'axe horizontal vers la droite, croissant vers le haut :
   0 = à droite, 90 = vers le haut, -90 = vers le bas, 180 = à gauche.

   Le cadre fait 200 × 170, le sol est à y = 150.
------------------------------------------------------------------ */

const SOL = 150;
const OS = { torse: 36, cou: 8, tete: 9, bras: 22, avant: 21, cuisse: 27, mollet: 26, pied: 11 };

const rad = (d) => (d * Math.PI) / 180;
/** Point à `len` du point `o`, dans la direction `ang` (degrés). */
const bout = (o, ang, len) => ({ x: o.x + len * Math.cos(rad(ang)), y: o.y - len * Math.sin(rad(ang)) });

/** Assemble un squelette complet à partir d'une pose. */
function squelette(p) {
  const bassin = { x: p.x, y: p.y };
  const epaules = bout(bassin, p.torse, OS.torse);
  const tete = bout(epaules, p.torse, OS.cou + OS.tete);

  const membre = (base, a1, a2, l1, l2) => {
    const mid = bout(base, a1, l1);
    return [base, mid, bout(mid, a2, l2)];
  };

  const brasP = membre(epaules, p.bras, p.avant, OS.bras, OS.avant);
  const brasL = membre(epaules, p.bras2 ?? p.bras, p.avant2 ?? p.avant, OS.bras, OS.avant);
  const jambeP = membre(bassin, p.cuisse, p.mollet, OS.cuisse, OS.mollet);
  const jambeL = membre(bassin, p.cuisse2 ?? p.cuisse, p.mollet2 ?? p.mollet, OS.cuisse, OS.mollet);
  const piedP = bout(jambeP[2], p.pied ?? 0, OS.pied);
  const piedL = bout(jambeL[2], p.pied2 ?? p.pied ?? 0, OS.pied);

  return { bassin, epaules, tete, brasP, brasL, jambeP, jambeL, piedP, piedL, pose: p };
}

/** Différence d'angle la plus courte, pour ne pas faire tourner un bras dans le mauvais sens. */
function ecartAngle(a, b) {
  let d = (b - a) % 360;
  if (d > 180) d -= 360;
  if (d < -180) d += 360;
  return d;
}

const CLES_POSE = ['x','y','torse','bras','avant','bras2','avant2','cuisse','mollet','cuisse2','mollet2','pied','pied2'];

/** Pose intermédiaire entre A et B (u de 0 à 1). */
function melange(a, b, u) {
  const p = {};
  for (const k of CLES_POSE) {
    const va = a[k], vb = b[k];
    if (va === undefined && vb === undefined) continue;
    const x = va ?? vb, y = vb ?? va;
    p[k] = k === 'x' || k === 'y' ? x + (y - x) * u : x + ecartAngle(x, y) * u;
  }
  return p;
}

/** La charge tenue, calculée à partir du squelette courant. */
function chargeDe(exo, sq, u) {
  const g = [];
  const mainP = sq.brasP[2], mainL = sq.brasL[2];
  const barre = (m, demi = 23) => {
    g.push({ t: 'ligne', x1: m.x - demi, y1: m.y, x2: m.x + demi, y2: m.y, cls: 'fig-charge', w: 3.4 });
    for (const s of [-1, 1]) {
      g.push({ t: 'ellipse', cx: m.x + s * (demi - 3), cy: m.y, rx: 3.2, ry: 9, cls: 'fig-charge-plein' });
    }
  };
  switch (exo.charge) {
    case 'barre': barre(mainP); break;
    case 'barre-courte': barre(mainP, 15); break;
    case 'halteres':
      for (const m of [mainL, mainP]) {
        g.push({ t: 'ligne', x1: m.x - 8, y1: m.y, x2: m.x + 8, y2: m.y, cls: 'fig-charge', w: 3 });
        for (const s of [-1, 1]) {
          g.push({ t: 'rect', x: m.x + s * 8 - 2.6, y: m.y - 5, w: 5.2, h: 10, cls: 'fig-charge-plein', plein: true });
        }
      }
      break;
    case 'haltere-un':
      g.push({ t: 'ligne', x1: mainP.x - 8, y1: mainP.y, x2: mainP.x + 8, y2: mainP.y, cls: 'fig-charge', w: 3 });
      for (const s of [-1, 1]) {
        g.push({ t: 'rect', x: mainP.x + s * 8 - 2.6, y: mainP.y - 5, w: 5.2, h: 10, cls: 'fig-charge-plein', plein: true });
      }
      break;
    case 'poignee': {
      const a = ANCRAGES[exo.decor] ?? ANCRAGES['poulie-haute'];
      g.push({ t: 'ligne', x1: a.x, y1: a.y, x2: mainP.x, y2: mainP.y, cls: 'fig-charge', w: 1.6 });
      g.push({ t: 'ligne', x1: mainP.x - 10, y1: mainP.y, x2: mainP.x + 10, y2: mainP.y, cls: 'fig-charge', w: 3.4 });
      break;

    case 'poignee-double':
      for (const [m, a] of [[mainP, { x: 176, y: 26 }], [mainL, { x: 24, y: 26 }]]) {
        g.push({ t: 'ligne', x1: a.x, y1: a.y, x2: m.x, y2: m.y, cls: 'fig-charge', w: 1.6 });
        g.push({ t: 'ligne', x1: m.x - 7, y1: m.y, x2: m.x + 7, y2: m.y, cls: 'fig-charge', w: 3.4 });
      }
      break;
    case 'corde': {

      const ry = 22 + 46 * u;
      g.push({ t: 'ellipse-vide', cx: mainP.x - 4, cy: 104, rx: 42, ry, cls: 'fig-charge' });

    case 'levier': {

    }
    case 'barre-t': {

      g.push({ t: 'ligne', x1: anc.x, y1: anc.y, x2: mainP.x + 12, y2: mainP.y, cls: 'fig-charge', w: 3.2 });
      for (const s2 of [-1, 1]) {
        g.push({ t: 'ellipse', cx: mainP.x + 12, cy: mainP.y + s2 * 7, rx: 8, ry: 3.2, cls: 'fig-charge-plein' });
      }
      break;
    }
    case 'pile': {
      // Machine guidée : la pile de poids monte quand le mouvement se fait.
      const haut = 118 - 46 * u;
      g.push({ t: 'rect', x: 164, y: haut, w: 20, h: 30, cls: 'fig-charge-plein', plein: true });
      g.push({ t: 'ligne', x1: 174, y1: 30, x2: 174, y2: haut, cls: 'fig-charge', w: 1.6 });
      break;
    }
  }
  return g;
}

/* ---------------- rendu ---------------- */

const NS = 'http://www.w3.org/2000/svg';

function creer(spec) {
  let el;
  if (spec.t === 'ligne') {
    el = document.createElementNS(NS, 'line');
  } else if (spec.t === 'rect') {
    el = document.createElementNS(NS, 'rect');
  } else if (spec.t === 'cercle') {
    el = document.createElementNS(NS, 'circle');
  } else if (spec.t === 'ellipse' || spec.t === 'ellipse-vide') {
    el = document.createElementNS(NS, 'ellipse');
  } else {
    el = document.createElementNS(NS, 'polyline');
  }
  majSpec(el, spec);
  return el;
}

function majSpec(el, s) {
  const set = (k, v) => el.setAttribute(k, typeof v === 'number' ? Math.round(v * 10) / 10 : v);
  if (s.cls) set('class', s.cls);
  if (s.t === 'ligne') {
    set('x1', s.x1); set('y1', s.y1); set('x2', s.x2); set('y2', s.y2);
    set('stroke-width', s.w ?? 3); set('stroke-linecap', 'round');
  } else if (s.t === 'rect') {
    set('x', s.x); set('y', s.y); set('width', s.w); set('height', s.h); set('rx', 2);
    if (!s.plein) { set('fill', 'none'); set('stroke-width', 2.5); }
  } else if (s.t === 'cercle') {
    set('cx', s.cx); set('cy', s.cy); set('r', s.r);
    if (s.w) { set('fill', 'none'); set('stroke-width', s.w); }
  } else if (s.t === 'ellipse' || s.t === 'ellipse-vide') {
    set('cx', s.cx); set('cy', s.cy); set('rx', s.rx); set('ry', s.ry);
    if (s.t === 'ellipse-vide') { set('fill', 'none'); set('stroke-width', 1.8); }
  } else {
    set('points', s.points.map((p) => `${Math.round(p.x * 10) / 10},${Math.round(p.y * 10) / 10}`).join(' '));
    set('stroke-width', s.w ?? 7); set('stroke-linecap', 'round'); set('stroke-linejoin', 'round');
    set('fill', 'none');
  }
}

/** Toutes les primitives d'une frame : décor, membres lointains, corps, charge. */
// Épaisseurs des membres : bras et jambes s'affinent vers l'extrémité, ce qui
// donne au personnage une allure de mannequin plutôt que de bâton.
const EP = { torse: 16, cou: 10, brasH: 8, brasB: 6.5, cuisseH: 11, cuisseB: 8, pied: 6 };

/** Un segment épais à bouts ronds (un « os »). */
function segment(a, b, cls, w) {
  return { t: 'poly', points: [a, b], cls, w };
}
/** Une pastille pleine pour lisser une articulation (coude, genou, main…). */
function pastille(pt, cls, r) {
  return { t: 'cercle', cx: pt.x, cy: pt.y, r, cls };
}

/** Un membre en deux os avec l'articulation du milieu adoucie. */
function membre(base, mid, ext, wH, wB, cls, plein) {
  return [
    segment(base, mid, cls, wH),
    segment(mid, ext, cls, wB),
    pastille(mid, plein, Math.max(wH, wB) / 2),
  ];
}

function frame(exo, u) {
  const p = melange(exo.poses[0], exo.poses[1], u);
  const sq = squelette(p);
  const cou = bout(sq.epaules, p.torse, OS.cou);

  const L = 'fig-membre-loin', LP = 'fig-membre-loin-plein';
  const C = 'fig-corps', CP = 'fig-corps-plein';

  // Côté éloigné (plus clair), dessiné derrière le tronc.
  const loin = [
    ...membre(sq.epaules, sq.brasL[1], sq.brasL[2], EP.brasH, EP.brasB, L, LP),
    pastille(sq.brasL[2], LP, EP.brasB / 2 + 0.5),
    ...membre(sq.bassin, sq.jambeL[1], sq.jambeL[2], EP.cuisseH, EP.cuisseB, L, LP),
    segment(sq.jambeL[2], sq.piedL, L, EP.pied),
    pastille(sq.jambeL[2], LP, EP.pied / 2),
  ];

  // Tronc, cou et tête.
  const tronc = [
    segment(sq.bassin, sq.epaules, C, EP.torse),
    segment(sq.epaules, cou, C, EP.cou),
    { t: 'cercle', cx: sq.tete.x, cy: sq.tete.y, r: OS.tete, cls: 'fig-tete' },
  ];

  // Côté proche (pleine couleur), au premier plan.
  const proche = [
    ...membre(sq.bassin, sq.jambeP[1], sq.jambeP[2], EP.cuisseH, EP.cuisseB, C, CP),
    segment(sq.jambeP[2], sq.piedP, C, EP.pied),
    pastille(sq.jambeP[2], CP, EP.pied / 2),
    ...membre(sq.epaules, sq.brasP[1], sq.brasP[2], EP.brasH, EP.brasB, C, CP),
    pastille(sq.brasP[2], CP, EP.brasB / 2 + 0.5),
  ];

  return [...decorDe(exo), ...loin, ...tronc, ...proche, ...chargeDe(exo, sq, u)];
}

/** Une figurine animée attachée à un <svg>. Les nœuds sont créés une fois puis mis à jour. */
class Figurine {
  constructor(svg, exo) {
    this.svg = svg;
    this.exo = exo;
    this.svg.setAttribute('viewBox', '0 0 200 170');
    this.svg.innerHTML = '';
    this.specs = frame(exo, 0);
    this.noeuds = this.specs.map((s) => {
      const el = creer(s);
      this.svg.appendChild(el);
      return el;
    });
    this.phase = Math.random() * 0.6;
  }
  dessine(u) {
    const specs = frame(this.exo, u);
    // Le nombre de primitives est constant pour un exercice donné.
    for (let i = 0; i < specs.length && i < this.noeuds.length; i++) majSpec(this.noeuds[i], specs[i]);
  }
}

/* Une seule boucle d'animation pour toutes les figurines visibles. */
const figurines = new Set();
let boucleLancee = false;
const doux = typeof window !== 'undefined' && window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

function animer(ms) {
  for (const f of figurines) {
    const duree = (f.exo.duree ?? 2.6) * 1000;
    const p = ((ms / duree) + f.phase) % 1;
    // Aller-retour, avec un temps mort aux deux extrémités du mouvement.
    const tri = p < 0.5 ? p * 2 : (1 - p) * 2;
    const u = tri * tri * (3 - 2 * tri);
    f.dessine(u);
  }
  requestAnimationFrame(animer);
}

const guetteur = typeof IntersectionObserver !== 'undefined'
  ? new IntersectionObserver((entrees) => {
      for (const e of entrees) {
        const f = e.target.__figurine;
        if (!f) continue;
        if (e.isIntersecting) figurines.add(f);
        else figurines.delete(f);
      }
    }, { rootMargin: '80px' })
  : null;

function ajouteFigurine(svg, exo) {
  const f = new Figurine(svg, exo);
  if (doux) { f.dessine(0.75); return f; }
  svg.__figurine = f;
  if (guetteur) guetteur.observe(svg);
  else figurines.add(f);
  if (!boucleLancee) { boucleLancee = true; requestAnimationFrame(animer); }
  return f;
}

if (typeof module !== 'undefined') module.exports = { frame, squelette, melange, SOL, OS };

let audioCtx = null;
function bip(freq = 880, duree = 0.14, volume = 0.2) {
  if (!S.reglages.son) return;
  try {
    audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.frequency.value = freq;
    o.type = 'sine';
    g.gain.setValueAtTime(volume, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duree);
    o.connect(g).connect(audioCtx.destination);
    o.start();
    o.stop(audioCtx.currentTime + duree);
  } catch (e) { /* pas de son disponible */ }
}

/* ---------------- construction du programme ---------------- */

const RANG_MAT = { maison: 0, halteres: 1, salle: 2 };

/** Candidats pour un patron de mouvement, les mieux équipés en tête. */
function candidatsPour(pattern, dispo) {
  const tous = dispo.filter((e) => e.pattern === pattern)
    .sort((a, b) => RANG_MAT[b.mat] - RANG_MAT[a.mat]);
  if (!tous.length) return { liste: [], k: 0 };
  // On ne fait tourner qu'entre les exercices du meilleur niveau de matériel :
  // inutile de proposer un squat au poids du corps à qui a une barre.
  const k = tous.filter((e) => RANG_MAT[e.mat] === RANG_MAT[tous[0].mat]).length;
  return { liste: tous, k };
}

function exosDisponibles(materiel) {
  const ok = MATERIELS[materiel].ok;
  return EXOS.filter((e) => ok.includes(e.mat));
}

/** Séries, répétitions et repos pour un exercice, selon l'objectif. */
function prescrire(exo, obj, niv) {
  const series = Math.min(5, Math.max(2, Math.round((exo.compose ? obj.series[1] : obj.series[0]) * niv.volume)));
  let reps = [...obj.reps];
  if (!exo.compose && reps[1] <= 6) reps = [8, 12];
  if (exo.temps) reps = [Math.round(obj.reps[0] * 2.5), Math.round(obj.reps[1] * 2.5)]; // en secondes
  if (exo.corps && !exo.temps) reps = [reps[0] + 2, reps[1] + 4];
  return { id: exo.id, series, reps, repos: exo.compose ? obj.reposCompose : obj.repos };
}

function genererProgramme(profil) {
  const obj = OBJECTIFS[profil.objectif];
  const niv = NIVEAUX[profil.niveau];
  const dispo = exosDisponibles(profil.materiel);
  const cles = decoupage(profil.jours, profil.niveau);

  return cles.map((cle, iSeance) => {
    const modele = SEANCES[cle];
    // Plus le repos est long, moins on peut caser d'exercices dans une séance.
    const nbExos = Math.min(niv.exos, obj.exosMax);
    const pris = [];
    for (const brique of modele.briques) {
      if (pris.length >= nbExos) break;
      const { liste, k } = candidatsPour(brique, dispo);
      const libres = liste.filter((e) => !pris.some((p) => p.id === e.id));
      if (!libres.length) continue;
      // Décalage selon la séance : deux jours « poussée » n'auront pas les mêmes exercices.
      const tete = libres.slice(0, Math.max(1, Math.min(k, libres.length)));
      pris.push(tete[(iSeance + pris.length) % tete.length]);
    }
    // Avec peu de matériel, certaines briques ne trouvent rien : on complète.
    if (pris.length < nbExos) {
      const patronsPris = new Set(pris.map((e) => e.pattern));
      const reste = dispo.filter((e) => !pris.some((p) => p.id === e.id));
      for (const e of [...reste.filter((e) => !patronsPris.has(e.pattern)), ...reste]) {
        if (pris.length >= nbExos) break;
        if (!pris.some((p) => p.id === e.id)) pris.push(e);
      }
    }
    return { cle, nom: modele.nom, exos: pris.map((e) => prescrire(e, obj, niv)) };
  });
}

/** Prochaine séance à faire : celle qui n'a pas été faite depuis le plus longtemps. */
function prochaineSeance() {
  if (!S.programme || !S.programme.length) return 0;
  let meilleur = 0, plusVieux = Infinity;
  S.programme.forEach((s, i) => {
    const d = S.faitLe[s.cle + '#' + i];
    const t = d ? jourDe(d).getTime() : 0;
    if (t < plusVieux) { plusVieux = t; meilleur = i; }
  });
  return meilleur;
}

/* ---------------- historique et progression ---------------- */

function dernieresSeriesDe(exoId) {
  for (let i = S.journal.length - 1; i >= 0; i--) {
    const e = S.journal[i].exos.find((x) => x.id === exoId);
    if (e && e.series.some((s) => s.reps)) return { series: e.series, date: S.journal[i].date };
  }
  return null;
}

/** Le double progressif : haut de la fourchette atteint partout → on monte la charge. */
function conseilCharge(exoId, prescription) {
  const exo = PAR_ID[exoId];
  const d = dernieresSeriesDe(exoId);
  if (!d) return { texte: 'Première fois : choisis une charge que tu maîtrises sur toutes les séries.', monter: false };
  const faites = d.series.filter((s) => s.reps > 0);
  const toutesAuMax = faites.length >= prescription.series && faites.every((s) => s.reps >= prescription.reps[1]);
  const kg = Math.max(...faites.map((s) => s.kg || 0));
  if (exo.temps || exo.charge === 'corps') {
    return toutesAuMax
      ? { texte: 'Objectif atteint partout : ajoute 2 répétitions ou ralentis la descente.', monter: true }
      : { texte: 'Vise le haut de la fourchette sur toutes les séries.', monter: false };
  }
  if (toutesAuMax) {
    const pas = exo.pas || 2.5;
    return { texte: 'Tu as tenu ' + prescription.reps[1] + ' partout : passe à ' + (kg + pas) + ' kg.', monter: true, kg: kg + pas };
  }
  return { texte: 'Dernière fois : ' + faites.map((s) => (s.kg ? s.kg + ' kg × ' : '') + s.reps).join(' · '), monter: false, kg };
}

function volumeSeance(s) {
  let v = 0;
  for (const e of s.exos) for (const x of e.series) v += (x.kg || 0) * (x.reps || 0);
  return v;
}

function recordDe(exoId) {
  let max = 0, rm = 0;
  for (const s of S.journal) {
    const e = s.exos.find((x) => x.id === exoId);
    if (!e) continue;
    for (const x of e.series) {
      if (!x.reps) continue;
      if ((x.kg || 0) > max) max = x.kg;
      // Formule d'Epley pour estimer le maxi à une répétition.
      const est = (x.kg || 0) * (1 + x.reps / 30);
      if (est > rm) rm = est;
    }
  }
  return { max, rm: Math.round(rm) };
}

function serieDeSeances() {
  // Nombre de semaines consécutives avec au moins une séance.
  if (!S.journal.length) return 0;
  const semaines = new Set(S.journal.map((s) => {
    const d = jourDe(s.date);
    const jan = new Date(d.getFullYear(), 0, 1);
    return d.getFullYear() + '-' + Math.floor((d - jan) / 604800000);
  }));
  let n = 0;
  const d = new Date();
  for (let i = 0; i < 60; i++) {
    const jan = new Date(d.getFullYear(), 0, 1);
    const cle = d.getFullYear() + '-' + Math.floor((d - jan) / 604800000);
    if (semaines.has(cle)) n++;
    else if (i > 0) break;
    d.setDate(d.getDate() - 7);
  }
  return n;
}

function dureeEstimee(seance) {
  let s = 0;
  for (const p of seance.exos) {
    const exo = PAR_ID[p.id];
    const travail = exo.temps ? p.reps[1] : p.reps[1] * 3.5;
    // Le dernier repos d'un exercice sert à installer le suivant : on ne le compte qu'une fois.
    s += p.series * travail + (p.series - 1) * p.repos + 60;
  }
  return Math.round(s / 60) + 5;
}

function ligneExo(p, extra = '') {
  const exo = PAR_ID[p.id];
  const [r1, r2] = p.reps;
  const unite = exo.temps ? ' s' : '';
  return `
    <button class="liste-exo" data-exo="${exo.id}">
      <svg class="vignette" data-fig="${exo.id}"></svg>
      <span style="flex:1;min-width:0">
        <span class="nom">${echapper(exo.nom)}</span>
        <span class="meta">${p.series} × ${r1}${r1 === r2 ? '' : '–' + r2}${unite} · repos ${p.repos} s${extra}</span>
      </span>
      <span class="disque" style="--c:${couleurGroupe(exo)}"></span>
    </button>`;
}

function couleurGroupeNom(g) {
  if (['pecs', 'triceps'].includes(g)) return 'var(--rouge)';
  if (['dorsaux', 'biceps', 'trapezes'].includes(g)) return 'var(--bleu)';
  if (['quadriceps', 'ischios', 'fessiers', 'mollets', 'adducteurs', 'abducteurs'].includes(g)) return 'var(--vert)';
  if (['epaules', 'epaules-arr'].includes(g)) return 'var(--accent)';
  return 'var(--violet)';
}

function couleurGroupe(exo) {
  return couleurGroupeNom(exo.groupes.p[0]);
}

/** Fait tourner le choix d'exercice à l'intérieur de chaque patron de mouvement. */
function melangerChoix(decalage) {
  const dispo = exosDisponibles(S.profil.materiel);
  S.programme.forEach((s, iS) => {
    const pris = new Set();
    s.exos.forEach((p, iE) => {
      const exo = PAR_ID[p.id];
      const { liste: candidats } = candidatsPour(exo.pattern, dispo);
      if (candidats.length < 2) { pris.add(p.id); return; }
      let choisi = candidats[(iS + iE + decalage) % candidats.length];
      if (pris.has(choisi.id)) choisi = candidats.find((c) => !pris.has(c.id)) || choisi;
      pris.add(choisi.id);
      const neuf = prescrire(choisi, OBJECTIFS[S.profil.objectif], NIVEAUX[S.profil.niveau]);
      s.exos[iE] = neuf;
    });
  });
}

function silhouette(exo, cote) {
  const p = new Set(exo.groupes.p), s = new Set(exo.groupes.s);
  const forme = ([g, t, a, b, c, d]) => {
    const cls = 'zone' + (p.has(g) ? ' primaire' : s.has(g) ? ' secondaire' : '');
    return t === 'ell'
      ? `<ellipse class="${cls}" cx="${a}" cy="${b}" rx="${c}" ry="${d}"/>`
      : `<rect class="${cls}" x="${a}" y="${b}" width="${c}" height="${d}" rx="4"/>`;
  };
  return `<svg viewBox="0 0 100 180" aria-hidden="true">
    <circle class="contour" cx="50" cy="14" r="9"/>
    <path class="contour" d="M50 24 L34 30 L28 46 L20 92 L14 92 M50 24 L66 30 L72 46 L80 92 L86 92
      M34 30 L34 88 L36 168 M66 30 L66 88 L64 168"/>
    ${ZONES[cote].map(forme).join('')}
  </svg>`;
}

function validerSerie(i) {
  const e = seance.exos[seance.i];
  const f = e.faites[i];
  const exo = PAR_ID[e.id];
  f.fait = !f.fait;
  if (f.fait) {
    if (f.reps === '' || f.reps === 0) f.reps = e.reps[1];
    // Record ? On compare à l'historique et aux séries déjà validées cette séance.
    const kg = Number(f.kg) || 0, reps = Number(f.reps) || 0;
    if (!exo.temps && kg > 0 && reps > 0) {
      const rec = recordDe(e.id);
      const dejaSeance = Math.max(0, ...e.faites.filter((x, idx) => idx !== i && x.fait).map((x) => Number(x.kg) || 0));
      if (kg > Math.max(rec.max, dejaSeance)) { f.pr = true; celebrerRecord(exo, kg, reps); }
    }
    if (f.kg !== '' && f.kg > 0) S.charges[e.id] = f.kg;
    // La série suivante hérite de la charge saisie.
    for (let k = i + 1; k < e.faites.length; k++) if (e.faites[k].kg === '') e.faites[k].kg = f.kg;
    sauver();
    vibrer(30);
    const reste = e.faites.some((x) => !x.fait);
    rendreSeance();
    if (reste) lancerRepos(e.repos, 'Série ' + (i + 2) + ' sur ' + e.series + ' — ' + PAR_ID[e.id].nom);
    else if (seance.i < seance.exos.length - 1) {
      lancerRepos(e.repos, 'Ensuite : ' + PAR_ID[seance.exos[seance.i + 1].id].nom);
    }
  } else {
    rendreSeance();
  }
}

function quitterSeance() {
  if (seance && seance.exos.some((e) => e.faites.some((f) => f.fait))) {
    if (!confirm('Quitter la séance ? Ce qui est validé sera enregistré.')) return;
    enregistrerSeance();
  }
  seance = null;
  arreterRepos();
  va('accueil');
}

function enregistrerSeance() {
  const exos = seance.exos
    .map((e) => ({ id: e.id, series: e.faites.filter((f) => f.fait).map((f) => ({ kg: Number(f.kg) || 0, reps: Number(f.reps) || 0 })) }))
    .filter((e) => e.series.length);
  if (!exos.length) return null;
  const entree = { date: auj(), cle: seance.cle, nom: seance.nom, duree: Math.round((Date.now() - seance.debut) / 60000), exos };
  S.journal.push(entree);
  S.faitLe[seance.cle] = auj();
  sauver();
  return entree;
}

function terminerSeance() {
  const entree = enregistrerSeance();
  arreterRepos();
  if (!entree) { seance = null; va('accueil'); toast('Séance abandonnée : rien à enregistrer'); return; }
  const volume = volumeSeance(entree);
  const nbSeries = entree.exos.reduce((a, e) => a + e.series.length, 0);
  seance = null;
  va('accueil');
  ouvrirFeuille(`

      <div class="stat"><div class="v">${entree.duree}</div><div class="l">minutes</div></div>
    </div>
    <button class="btn plein large" style="margin-top:16px" onclick="fermerFeuille()">Parfait</button>`);

  bip(660, 0.12); setTimeout(() => bip(880, 0.18), 130);
}

/* ---------------- chrono de repos ---------------- */

let repos = { total: 0, reste: 0, timer: null };
const CIRCONFERENCE = 2 * Math.PI * 86;

function lancerRepos(secondes, suite) {
  repos.total = secondes;
  repos.reste = secondes;
  $('#repos-suite').textContent = suite || '';
  $('#repos').classList.add('ouvert');
  $('#repos').classList.remove('fini');
  majRepos();
  clearInterval(repos.timer);
  repos.timer = setInterval(() => {
    repos.reste--;
    majRepos();
    if (repos.reste === 3) bip(520, 0.08, 0.12);
    if (repos.reste <= 0) {
      clearInterval(repos.timer);
      $('#repos').classList.add('fini');
      bip(880, 0.25); vibrer([120, 60, 120]);
      setTimeout(arreterRepos, 2500);
    }
  }, 1000);
}

function majRepos() {
  const r = Math.max(0, repos.reste);
  $('#compte-repos').textContent = r;
  const part = repos.total ? r / repos.total : 0;
  const j = $('#jauge-repos');
  j.setAttribute('stroke-dasharray', CIRCONFERENCE);
  j.setAttribute('stroke-dashoffset', CIRCONFERENCE * (1 - part));
}

function arreterRepos() {
  clearInterval(repos.timer);
  $('#repos').classList.remove('ouvert', 'fini');
}

function courbeExo(id) {

  });

  if (points.length < 2) {

      <span class="puce pousse">${rec.max ? rec.max + ' kg' : 'au poids du corps'}</span></div></div>`;

    </div>
    ${courbe(points, 'kg')}</div>`;
}

/** Petite courbe SVG, avec aire, grille et point final marqué. */
function courbe(valeurs, unite) {
  const L = 300, H = 110, m = 14;
  const min = Math.min(...valeurs), max = Math.max(...valeurs);
  const etendue = max - min || 1;
  const pts = valeurs.map((v, i) => {
    const x = m + (i / Math.max(1, valeurs.length - 1)) * (L - 2 * m);
    const y = H - m - ((v - min) / etendue) * (H - 2 * m);
    return [x, y];
  });
  const d = pts.map((p, i) => (i ? 'L' : 'M') + p[0].toFixed(1) + ' ' + p[1].toFixed(1)).join(' ');
  const aire = d + ` L${pts[pts.length - 1][0].toFixed(1)} ${H - m} L${pts[0][0].toFixed(1)} ${H - m} Z`;
  const dernier = pts[pts.length - 1];
  return `<svg class="graphe" viewBox="0 0 ${L} ${H}" preserveAspectRatio="none">
    <line class="grille" x1="${m}" y1="${H - m}" x2="${L - m}" y2="${H - m}"/>
    <path class="aire" d="${aire}"/>
    <path class="ligne" d="${d}"/>
    <circle class="bout" cx="${dernier[0].toFixed(1)}" cy="${dernier[1].toFixed(1)}" r="4"/>
    <text x="${m}" y="12">${max} ${unite}</text>
    <text x="${m}" y="${H - 2}">${min} ${unite}</text>
  </svg>`;
}

function exporter() {

function importer() {
  const inp = document.createElement('input');
  inp.type = 'file';
  inp.accept = 'application/json,.json';
  inp.addEventListener('change', () => {
    const f = inp.files[0];
    if (!f) return;
    const lecteur = new FileReader();
    lecteur.onload = () => {
      try {
        const donnees = JSON.parse(lecteur.result);
        if (!donnees.profil) throw new Error('fichier incomplet');
        S = { ...copie(ETAT_VIDE), ...donnees };
        sauver();
        va('accueil');
        toast('Données restaurées');
      } catch (e) {
        toast('Fichier illisible : ' + e.message);
      }
    };
    lecteur.readAsText(f);
  });
  inp.click();
}

/* ---------------- échauffement, record, remplacement (séance) ---------------- */

/** Séries d'échauffement montantes pour un exercice chargé. */
function echauffement(exo, kgTravail) {
  if (exo.temps || exo.charge === 'corps' || !kgTravail || kgTravail < 20) return null;
  const barbell = /barre/.test(exo.charge || '');
  const rond = (v) => Math.max(barbell ? 20 : 2.5, Math.round(v / 2.5) * 2.5);
  const series = [];
  if (barbell) series.push({ kg: 20, reps: 8, note: 'barre à vide' });
  series.push({ kg: rond(kgTravail * 0.5), reps: 5, note: '50 %' });
  series.push({ kg: rond(kgTravail * 0.7), reps: 3, note: '70 %' });
  if (kgTravail >= 40) series.push({ kg: rond(kgTravail * 0.85), reps: 1, note: '85 %' });
  return series;
}

function carteEchauffement(e, conseil) {
  const exo = PAR_ID[e.id];
  const kgT = Number(e.faites[0].kg) || conseil.kg || S.charges[e.id] || 0;
  const series = echauffement(exo, kgT);
  if (!series) return '';
  return `<details class="echauffement">
    <summary>Échauffement conseillé</summary>
    <div class="ech-liste">
      ${series.map((x) => `<div class="ech-serie"><span class="num">${x.kg} kg</span><span>× ${x.reps}</span><span class="ech-note">${x.note}</span></div>`).join('')}
    </div>
    <p class="consigne" style="margin:8px 0 0">Ces séries ne comptent pas : elles préparent l'articulation. Repos court entre elles.</p>
  </details>`;
}

function celebrerRecord(exo, kg, reps) {
  $$('.toast').forEach((t) => t.remove());

/* ---------------- suivi : calendrier, volume par muscle, mensurations ---------------- */

/** Damier des 15 dernières semaines, une case par jour, intensité = volume. */
function calendrierHTML() {
  const SEM = 15;
  const vol = {};
  S.journal.forEach((s) => { vol[s.date] = (vol[s.date] || 0) + volumeSeance(s); });
  const max = Math.max(1, ...Object.values(vol));
  const today = new Date(); today.setHours(12, 0, 0, 0);
  const lundi = new Date(today);
  lundi.setDate(today.getDate() - ((today.getDay() + 6) % 7)); // lundi de la semaine
  const cols = [];
  for (let w = SEM - 1; w >= 0; w--) {
    const cases = [];
    for (let d = 0; d < 7; d++) {
      const jour = new Date(lundi);
      jour.setDate(lundi.getDate() - w * 7 + d);
      const iso = jour.toISOString().slice(0, 10);
      if (jour > today) { cases.push('<i class="cal nf"></i>'); continue; }
      const v = vol[iso] || 0;
      const n = v === 0 ? 0 : Math.min(3, Math.ceil((v / max) * 3));
      cases.push(`<i class="cal n${n}" title="${iso}${v ? ' · ' + Math.round(v) + ' kg' : ''}"></i>`);
    }
    cols.push(`<div class="cal-col">${cases.join('')}</div>`);
  }
  return `<div class="calendrier">${cols.join('')}</div>`;
}

/** Nombre de séries par groupe musculaire sur les 7 derniers jours. */
function volumeMuscleHTML() {
  const sets = {};
  S.journal.filter((s) => joursEcoules(s.date) < 7).forEach((s) => s.exos.forEach((e) => {
    const exo = PAR_ID[e.id];
    if (exo) exo.groupes.p.forEach((g) => { sets[g] = (sets[g] || 0) + e.series.length; });
  }));
  const lignes = Object.entries(sets).sort((a, b) => b[1] - a[1]);
  if (!lignes.length) return '<div class="carte consigne">Aucune série enregistrée cette semaine.</div>';
  const max = Math.max(...lignes.map((l) => l[1]), 14);
  return `<div class="carte">
    ${lignes.map(([g, n]) => `
      <div class="vm-ligne">
        <span class="vm-nom">${echapper(MUSCLES[g] || g)}</span>
        <span class="vm-barre"><i style="width:${Math.min(100, (n / max) * 100)}%;background:${couleurGroupeNom(g)}"></i></span>
        <span class="num vm-n">${n}</span>
      </div>`).join('')}
    <p class="consigne" style="margin:8px 0 0">Vise 10 à 20 séries par muscle et par semaine.</p>
  </div>`;
}

/* ---------------- calculateur de plaques ---------------- */

// Disques olympiques, du plus lourd au plus léger, avec leur couleur et leur taille.
const DISQUES = [
  { kg: 25, c: 'var(--rouge)', h: 50 }, { kg: 20, c: 'var(--bleu)', h: 46 }, { kg: 15, c: 'var(--accent)', h: 40 },
  { kg: 10, c: 'var(--vert)', h: 32 }, { kg: 5, c: 'var(--blanc-disque)', h: 24 },
  { kg: 2.5, c: 'var(--rouge)', h: 18 }, { kg: 1.25, c: '#9aa3af', h: 13 },
];

function plaquesParCote(total, barre) {
  let reste = (total - barre) / 2;
  if (reste < -0.01) return null;
  const plaques = [];
  for (const d of DISQUES) while (reste >= d.kg - 1e-9) { plaques.push(d); reste -= d.kg; }
  return { plaques, restant: Math.round(reste * 100) / 100 };
}

function outilPlaques() {
  ouvrirFeuille(`
    <h2 style="font-size:23px;text-transform:uppercase">Calculateur de plaques</h2>
    <p class="consigne">Les disques à enfiler de chaque côté de la barre, aux couleurs officielles.</p>
    <div class="grille-2" style="margin-top:14px">
      <label class="champ"><span>Charge totale (kg)</span>
        <input type="number" inputmode="decimal" step="2.5" id="pl-total" value="60"></label>
      <label class="champ"><span>Barre</span><select id="pl-barre">
        <option value="20">Olympique — 20 kg</option>
        <option value="15">Femme — 15 kg</option>
        <option value="10">Courte / EZ — 10 kg</option>
        <option value="0">Sans barre</option>
      </select></label>
    </div>
    <div id="pl-sortie"></div>
    <div class="section-titre">Convertir</div>
    <div class="grille-2">
      <label class="champ"><span>Kilos</span><input type="number" inputmode="decimal" id="pl-kg" value="60"></label>
      <label class="champ"><span>Livres (lb)</span><input type="number" inputmode="decimal" id="pl-lb" value="132.3"></label>
    </div>`);

  const calc = () => {
    const total = Number($('#pl-total').value) || 0;
    const barre = Number($('#pl-barre').value);
    const box = $('#pl-sortie');
    const r = plaquesParCote(total, barre);
    if (!r) { box.innerHTML = `<div class="carte consigne">La barre seule (${barre} kg) est déjà plus lourde que ${total} kg.</div>`; return; }
    const { plaques, restant } = r;
    const cy = 66;
    let x = 100;
    const pw = 11, gap = 3;
    let disques = '';
    for (const d of plaques) {
      disques += `<rect x="${x}" y="${cy - d.h / 2}" width="${pw}" height="${d.h}" rx="2" fill="${d.c}" stroke="rgba(0,0,0,.28)" stroke-width="1"/>`;
      x += pw + gap;
    }
    const larg = Math.max(300, x + 16);
    const svg = `<svg viewBox="0 0 ${larg} 130" style="width:100%;height:120px;display:block" aria-hidden="true">
      <line x1="18" y1="${cy}" x2="94" y2="${cy}" stroke="var(--texte-faible)" stroke-width="7" stroke-linecap="round"/>
      <rect x="92" y="${cy - 10}" width="8" height="20" rx="2" fill="var(--texte-faible)"/>
      <line x1="100" y1="${cy}" x2="${x + 6}" y2="${cy}" stroke="var(--texte-faible)" stroke-width="4"/>
      ${disques}
    </svg>`;
    const compte = [];
    plaques.forEach((d) => {
      const last = compte[compte.length - 1];
      if (last && last.kg === d.kg) last.n++; else compte.push({ kg: d.kg, n: 1 });
    });
    const resume = compte.length
      ? compte.map((c) => `<span class="puce" style="font-size:13px">${c.n} × ${c.kg} kg</span>`).join(' ')
      : '<span class="consigne">Juste la barre, rien à charger.</span>';
    box.innerHTML = `<div class="carte" style="text-align:center">${svg}
      <div style="margin:4px 0 8px;font-family:var(--display);font-size:11px;text-transform:uppercase;letter-spacing:.14em;color:var(--texte-faible)">de chaque côté</div>
      <div class="rangee" style="flex-wrap:wrap;gap:6px;justify-content:center">${resume}</div>
      ${restant > 0 ? `<div class="consigne" style="margin-top:8px;color:var(--alerte)">Pas atteignable exactement : il manque ${restant} kg par côté avec ces disques.</div>` : ''}
    </div>`;
  };
  $('#pl-total').addEventListener('input', calc);
  $('#pl-barre').addEventListener('change', calc);
  calc();

  const kg = $('#pl-kg'), lb = $('#pl-lb');
  kg.addEventListener('input', () => { lb.value = (Number(kg.value) / 0.45359237).toFixed(1); });
  lb.addEventListener('input', () => { kg.value = (Number(lb.value) * 0.45359237).toFixed(1); });
}

/* ---------------- thème ---------------- */

const ICONES_THEME = {
  sombre: '<circle cx="12" cy="12" r="4.5"/><path d="M12 2.6v2.4M12 19v2.4M21.4 12H19M5 12H2.6M18.4 5.6 16.7 7.3M7.3 16.7 5.6 18.4M18.4 18.4 16.7 16.7M7.3 7.3 5.6 5.6"/>',
  clair: '<path d="M20 14.5A8.2 8.2 0 0 1 9.5 4 8.3 8.3 0 1 0 20 14.5Z"/>',
};

function appliquerTheme() {
  const t = S.reglages.theme;
  if (t === 'auto') document.documentElement.removeAttribute('data-theme');
  else document.documentElement.setAttribute('data-theme', t);
  const sombre = t === 'dark' || (t === 'auto' && matchMedia('(prefers-color-scheme: dark)').matches);
  $('#icone-theme').innerHTML = sombre ? ICONES_THEME.sombre : ICONES_THEME.clair;
  const meta = document.querySelector('meta[name="theme-color"]');
  if (meta) meta.content = sombre ? '#14171c' : '#f0efeb';
}

/* ---------------- démarrage ---------------- */

function preparerTete() {
  const tete = document.head;
  const ajouter = (nom, attrs) => {
    const el = document.createElement(nom);
    Object.entries(attrs).forEach(([k, v]) => el.setAttribute(k, v));
    tete.appendChild(el);
    return el;
  };
  if (!document.querySelector('meta[name="viewport"]')) {
    ajouter('meta', { name: 'viewport', content: 'width=device-width, initial-scale=1, viewport-fit=cover' });
  }
  if (!document.querySelector('meta[name="theme-color"]')) ajouter('meta', { name: 'theme-color', content: '#14171c' });
  ajouter('meta', { name: 'mobile-web-app-capable', content: 'yes' });
  ajouter('meta', { name: 'apple-mobile-web-app-capable', content: 'yes' });
  ajouter('meta', { name: 'apple-mobile-web-app-status-bar-style', content: 'black-translucent' });
  ajouter('meta', { name: 'apple-mobile-web-app-title', content: 'Fonte' });

  // Icône : un disque olympique, dessiné en SVG et embarqué dans la page.
  const icone = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
    <rect width="64" height="64" rx="14" fill="#14171c"/>
    <circle cx="32" cy="32" r="19" fill="none" stroke="#f2c230" stroke-width="9"/>
    <circle cx="32" cy="32" r="6" fill="none" stroke="#f2c230" stroke-width="3"/></svg>`;
  const url = 'data:image/svg+xml,' + encodeURIComponent(icone);
  if (!document.querySelector('link[rel="icon"]')) ajouter('link', { rel: 'icon', href: url });
  if (!document.querySelector('link[rel="apple-touch-icon"]')) ajouter('link', { rel: 'apple-touch-icon', href: url });

  const manifeste = {
    name: 'Fonte — carnet de salle', short_name: 'Fonte', start_url: location.href,
    display: 'standalone', background_color: '#14171c', theme_color: '#14171c',
    icons: [{ src: url, sizes: '512x512', type: 'image/svg+xml', purpose: 'any' }],
  };
  if (!document.querySelector('link[rel="manifest"]')) {
    try {
      ajouter('link', { rel: 'manifest', href: 'data:application/manifest+json,' + encodeURIComponent(JSON.stringify(manifeste)) });
    } catch (e) { /* certains navigateurs refusent les manifestes en data: */ }
  }

  // Hors ligne complet quand la page est servie en https (GitHub Pages).
  if ('serviceWorker' in navigator && location.protocol === 'https:') {
    navigator.serviceWorker.register('sw.js').catch(() => { /* pas grave : l'app marche quand même */ });
  }
}

function demarrer() {
  preparerTete();
  appliquerTheme();

  $$('#nav button').forEach((b) => b.addEventListener('click', () => va(b.dataset.va)));
  $('#btn-theme').addEventListener('click', () => {
    const suite = { auto: 'light', light: 'dark', dark: 'auto' };
    S.reglages.theme = suite[S.reglages.theme] || 'auto';
    sauver();
    appliquerTheme();
    toast('Thème : ' + ({ auto: 'automatique', light: 'clair', dark: 'sombre' })[S.reglages.theme]);
  });
  $('#feuille').addEventListener('click', (ev) => { if (ev.target.id === 'feuille') fermerFeuille(); });
  $('#repos-passer').addEventListener('click', arreterRepos);
  $('#repos-plus').addEventListener('click', () => { repos.reste += 30; repos.total = Math.max(repos.total, repos.reste); majRepos(); });
  $('#repos-moins').addEventListener('click', () => { repos.reste = Math.max(1, repos.reste - 30); majRepos(); });
  matchMedia('(prefers-color-scheme: dark)').addEventListener('change', appliquerTheme);

  // Le chrono de repos continue de tourner quand l'écran s'éteint.
  document.addEventListener('visibilitychange', () => { if (!document.hidden && repos.timer) majRepos(); });

  va(S.profil && S.programme ? 'accueil' : 'debut');
}

demarrer();
